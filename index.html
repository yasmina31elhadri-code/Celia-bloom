<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celia Bloom | المتجر الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function CeliaBloom() {
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem("celia_products");
                return saved ? JSON.parse(saved) : [];
            });

            const [newProduct, setNewProduct] = useState({ name: "", description: "", price: "", imageUrl: "" });

            useEffect(() => {
                localStorage.setItem("celia_products", JSON.stringify(products));
            }, [products]);

            const addProduct = () => {
                if (!newProduct.name || !newProduct.price) return;
                setProducts([...products, { ...newProduct, id: Date.now() }]);
                setNewProduct({ name: "", description: "", price: "", imageUrl: "" });
            };

            const deleteProduct = (id) => setProducts(products.filter(p => p.id !== id));

            return (
                <div className="min-h-screen bg-pink-50 text-gray-800">
                    <header className="py-12 text-center bg-white shadow-sm">
                        <h1 className="text-5xl font-bold text-pink-600">Celia Bloom</h1>
                        <p className="text-gray-500 mt-2 italic">Where beauty blossoms</p>
                    </header>

                    <main className="max-w-4xl mx-auto p-6">
                        <section className="bg-white p-6 rounded-2xl shadow-md mb-12">
                            <h2 className="text-xl font-bold mb-4">إضافة منتج جديد (Admin)</h2>
                            <div className="grid gap-4">
                                <input className="border p-2 rounded" placeholder="اسم المنتج" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} />
                                <input className="border p-2 rounded" placeholder="رابط الصورة" value={newProduct.imageUrl} onChange={e => setNewProduct({...newProduct, imageUrl: e.target.value})} />
                                <input className="border p-2 rounded" type="number" placeholder="الثمن (MAD)" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} />
                                <button onClick={addProduct} className="bg-pink-500 text-white py-2 rounded font-bold">إضافة للمتجر</button>
                            </div>
                        </section>

                        <div className="grid md:grid-cols-2 gap-6">
                            {products.map(p => (
                                <div key={p.id} className="bg-white rounded-xl shadow overflow-hidden border border-pink-100">
                                    <img src={p.imageUrl || 'https://via.placeholder.com/300'} className="w-full h-48 object-cover" />
                                    <div className="p-4">
                                        <h3 className="font-bold text-lg">{p.name}</h3>
                                        <p className="text-pink-600 font-bold">{p.price} MAD</p>
                                        <div className="flex gap-2 mt-4">
                                            <a href={`https://wa.me/212781566016?text=أريد طلب ${p.name}`} className="bg-green-500 text-white flex-1 text-center py-2 rounded text-sm">طلب عبر واتساب</a>
                                            <button onClick={() => deleteProduct(p.id)} className="bg-red-100 text-red-500 px-3 rounded">حذف</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CeliaBloom />);
    </script>
</body>
</html>
